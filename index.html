<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTOON STUDIOS - Lisez les meilleurs Webtoons Originaux</title>
    <meta name="description" content="Plongez dans les univers d'INTOON STUDIOS. Lisez des dizaines de chapitres de webtoons d'action, romance et isekai gratuitement et en avant-première.">
    <!-- Google Fonts: Inter pour un look Netflix authentique (UI solide et lisible) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <!-- SUPABASE BDD CLIENT SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Favicon Premium -->
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    
    <!-- Style principal -->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Navbar Premium Netflix/Stitch -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" data-link class="logo" style="display:flex; align-items:center;">
                <!-- Logo Vectoriel Personnalisé INTOON (Livre Isométrique + Étincelle Digitale) -->
                <svg class="intoon-logo-svg" viewBox="0 0 40 40" width="38" height="38" xmlns="http://www.w3.org/2000/svg" style="margin-right:8px; overflow:visible;">
                    <!-- Couverture arrière (ombre) -->
                    <path class="svg-shadow" d="M 20 6 L 36 13.5 L 36 33.5 L 20 26 Z" fill="rgba(255,255,255,0.05)" stroke="#444" stroke-width="1.5" stroke-linejoin="round"/>
                    <!-- Page droite animable -->
                    <path class="svg-page-right" d="M 20 6 L 34 12.5 L 34 32.5 L 20 26 Z" fill="rgba(255,255,255,0.8)" />
                    <!-- Couverture avant (Rouge INTOON) -->
                    <path class="svg-cover-left" d="M 4 13.5 L 20 6 L 20 26 L 4 33.5 Z" fill="var(--primary)" stroke="#c91f27" stroke-width="1" stroke-linejoin="round"/>
                    <!-- Rayon / Connecteur Tech -->
                    <path class="svg-beam" d="M 12 18 L 26 12" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="2 2" opacity="0.8"/>
                    <!-- Puce centrale / Étincelle de création -->
                    <circle class="svg-dot" cx="20" cy="14.5" r="2.5" fill="#FFD700" />
                </svg>
                
                <div>
                    <span class="logo-red">IN</span><span>TOON</span> 
                    <span class="logo-text-hide" style="font-weight:300; font-size:1rem; letter-spacing:3px; margin-left:8px; color:#aaa; margin-top:4px;">STUDIOS</span>
                </div>
            </a>
            <div class="search-wrapper" id="search-bar-container">
                <span class="material-symbols-outlined search-icon" id="search-trigger">search</span>
                <input type="text" id="global-search-input" placeholder="Titres, genres, auteurs..." maxlength="40">
            </div>

            <nav class="nav-links">
                <a href="/" data-link style="display:flex; align-items:center; gap:5px;"><span class="material-symbols-outlined" style="font-size:1.2rem;">home</span> <span class="nav-text">Accueil</span></a>
                <a href="/studio" data-link style="display:flex; align-items:center; gap:5px;"><span class="material-symbols-outlined" style="font-size:1.2rem;">brush</span> <span class="nav-text">Le Studio</span></a>
                <a href="/favoris" data-link style="display:flex; align-items:center; gap:5px;"><span class="material-symbols-outlined" style="font-size:1.2rem;">bookmark</span> <span class="nav-text">Ma Liste</span></a>
                <a href="/connexion" id="btn-connexion" data-link class="btn-secondary" style="display:flex; align-items:center; gap:6px; padding:8px 20px;">
                    <span class="material-symbols-outlined" style="font-size:1.2rem;">person</span> <span class="nav-text">Mon Compte</span>
                </a>
            </nav>
        </div>
    </nav>

    <!-- Conteneur MVC: Les vues s'injecteront ici -->
    <main id="app">
        <div class="loader">Chargement...</div>
    </main>

    <!-- Scripts type module pour la POO native -->
    <script type="module" src="/js/app.js"></script>
</body>
</html>
